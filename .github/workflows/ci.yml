name: CI

on:
  pull_request:
    paths:
      - 'projects/**'
      - 'packages/**'
  push:
    branches: [main, develop]
    paths:
      - 'projects/**'
      - 'packages/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check packages/ projects/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r requirements-base.txt
      - name: Detect changes and run tests
        run: |
          PACKAGES_CHANGED=$(git diff --name-only origin/main...HEAD -- packages/ 2>/dev/null | head -1)
          if [ -n "$PACKAGES_CHANGED" ]; then
            echo "packages/ changed, running all tests"
            pytest projects/ packages/ -m "not smoke" --tb=short -q
          else
            CHANGED_MEMBERS=$(git diff --name-only origin/main...HEAD -- projects/ 2>/dev/null | sed 's|projects/\([^/]*\)/.*|\1|' | sort -u | grep -v _template)
            if [ -n "$CHANGED_MEMBERS" ]; then
              for member in $CHANGED_MEMBERS; do
                echo "Testing projects/$member/"
                pytest "projects/$member/" -m "not smoke" --tb=short -q || true
              done
            else
              echo "No project changes detected"
            fi
          fi

  smoke:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          pip install -e .
          pip install -r requirements-base.txt
      - run: pytest projects/ -m smoke --tb=short -q
